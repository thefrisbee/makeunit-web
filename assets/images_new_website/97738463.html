<script type="application/ld+json">{"embedUrl":"https://player.vimeo.com/video/97738463?h=d667a1ca14","thumbnailUrl":"https://i.vimeocdn.com/video/478217503-03501b8e813730a2a78c407ee903840fdf1e3d384cfee51a74846581f0de6495-d?f=webp","name":"The New Tate Britain - Meet Tate Britain","description":"In 2013, The New Tate Britain completed a ₤45m refurbishment. We set out to help deliver an in-gallery experience that would echo the innovative curatorial approach taken by Tate Britain in it's relaunch.\r\n\r\nOur objective was to engage the Tate's key audience with something they would want to be a part of and share.\r\nWorking with The Brooklyn Brothers,we created a digital installation that interlaces real-time photographic submissions from the public together with 500 years of British Art.\r\n\r\nThe piece would invite visitors to express their own connections with the collection by submitting inspired photographs via mobile upload or tagging Twitter and Instagram images with #MeetTateBritain.\r\n\r\nEach submission sparks a unique evolving composition within the display. The work visualises conceptual and aesthetic connective threads between the past and present of creativity.","duration":"PT99S","uploadDate":"2014-06-09T12:30:57-04:00","@context":"https://schema.org/","@type":"VideoObject"}</script>
